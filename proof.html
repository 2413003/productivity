<!doctype html>
<meta charset="utf-8">
<title>Do storage proof</title>
<style>
  :root {
    color: #11130f;
    background: #fafbf8;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    padding: 48px;
  }

  h1 {
    margin: 0 0 24px;
    font-size: 48px;
    line-height: 1;
  }

  pre {
    white-space: pre-wrap;
    font: 15px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    background: #fff;
    border: 1px solid #d9ded4;
    border-radius: 8px;
    padding: 18px;
  }

  a {
    display: inline-flex;
    margin-top: 18px;
    color: #11130f;
    font-weight: 800;
  }
</style>
<h1>Storage proof</h1>
<pre id="out"></pre>
<a href="index.html?view=map">Open map</a>
<script>
  const interesting = (key) =>
    key === "priority-state-v1" ||
    key === "two-choice-state-v1" ||
    key.startsWith("do-account-state-v1:") ||
    key.startsWith("priority-state-before-recovery-v1:");

  function summaryFor(key) {
    const raw = localStorage.getItem(key) || "";
    let state = null;

    try {
      state = JSON.parse(raw);
    } catch (error) {
      state = null;
    }

    return {
      key,
      bytes: raw.length,
      profileId: state?.reputation?.profileId || "",
      objectives: Array.isArray(state?.objectives) ? state.objectives.length : null,
      tasks: Array.isArray(state?.tasks) ? state.tasks.length : null,
      crmPeople: Array.isArray(state?.crm?.people) ? state.crm.people.length : null,
      sleep: Array.isArray(state?.personal?.sleep) ? state.personal.sleep.length : null,
      food: Array.isArray(state?.personal?.food) ? state.personal.food.length : null,
      mind: Array.isArray(state?.personal?.mind) ? state.personal.mind.length : null,
      beliefs: Array.isArray(state?.learn?.beliefs) ? state.learn.beliefs.length : null,
      learnPeople: Array.isArray(state?.learn?.people) ? state.learn.people.length : null
    };
  }

  const summaries = Object.keys(localStorage).filter(interesting).sort().map(summaryFor);
  document.getElementById("out").textContent = JSON.stringify(
    {
      origin: location.origin,
      savedHere: summaries
    },
    null,
    2
  );
</script>
