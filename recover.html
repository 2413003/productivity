<!doctype html>
<meta charset="utf-8">
<title>Recover Do data</title>
<style>
  :root {
    color: #11130f;
    background: #fafbf8;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }

  main {
    width: min(520px, calc(100vw - 48px));
  }

  h1 {
    margin: 0 0 12px;
    font-size: 36px;
    line-height: 1;
  }

  p {
    margin: 0;
    color: #676d63;
    font-size: 18px;
    line-height: 1.4;
  }
</style>
<main>
  <h1>Recovering</h1>
  <p id="status">Finding recovered data...</p>
</main>
<script>
  const STORE_KEY = "priority-state-v1";
  const ACCOUNT_STORE_PREFIX = "do-account-state-v1:";
  const status = document.getElementById("status");

  function stateScore(state) {
    return [
      state.tasks,
      state.objectives,
      state.crm?.people,
      state.financial?.accounts,
      state.personal?.sleep,
      state.personal?.food,
      state.personal?.mind,
      state.learn?.beliefs,
      state.learn?.people,
      state.learn?.categories,
      state.reputation?.proofs,
      state.reputation?.supporters
    ].reduce((total, list) => total + (Array.isArray(list) ? list.length : 0), 0);
  }

  async function recover() {
    const recovered = await fetch(".codex-recovered-runmk-state.json", { cache: "no-store" }).then((response) => {
      if (!response.ok) {
        throw new Error("Recovered data file was not found.");
      }

      return response.json();
    });
    const currentRaw = localStorage.getItem(STORE_KEY);
    const current = currentRaw ? JSON.parse(currentRaw) : null;
    const currentScore = current ? stateScore(current) : 0;
    const recoveredScore = stateScore(recovered);
    const now = Date.now();
    const profileId = recovered.reputation?.profileId;

    if (currentRaw) {
      localStorage.setItem(`priority-state-before-recovery-v1:${now}`, currentRaw);
    }

    if (recoveredScore >= currentScore) {
      const raw = JSON.stringify(recovered);
      localStorage.setItem(STORE_KEY, raw);

      if (profileId) {
        localStorage.setItem(`${ACCOUNT_STORE_PREFIX}${profileId}`, JSON.stringify({ ...recovered, cachedAt: now }));
      }
    }

    status.textContent = `Recovered ${recovered.objectives?.length || 0} objectives. Opening app...`;
    window.setTimeout(() => {
      window.location.replace(`index.html?recovered=${now}`);
    }, 650);
  }

  recover().catch((error) => {
    status.textContent = error.message || "Recovery failed.";
  });
</script>
